naftiko: "1.0.0-alpha1"

info:
  label: "Volkswagen OKAPI API"
  description: >-
    The Volkswagen OKAPI (Open Konfigurator API) enables access to VW AG product
    data across global markets. Supports catalog browsing (countries, brands, models,
    types, options), vehicle configuration with buildability validation, and information
    retrieval (WLTP emissions, images, order/pricing data).
  tags:
    - Volkswagen
    - Automotive
    - Vehicle Configuration
    - Product Data
    - Konfigurator
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VOLKSWAGEN_OKAPI_TOKEN: VOLKSWAGEN_OKAPI_TOKEN

capability:
  consumes:
    - type: http
      namespace: volkswagen-okapi
      baseUri: https://productdata.volkswagenag.com/v3
      description: "Volkswagen OKAPI product data and configuration API."
      authentication:
        type: bearer
        token: "{{VOLKSWAGEN_OKAPI_TOKEN}}"
      resources:
        - name: countries
          path: /countries
          description: "List supported markets."
          operations:
            - name: list-countries
              method: GET
              description: "List all countries where OKAPI vehicle configuration is available."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: brands
          path: /catalog/{countryCode}/brands
          description: "VW Group brands by market."
          operations:
            - name: list-brands-by-country
              method: GET
              description: "List VW Group brands available in a country."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
                  description: "ISO 3166-2 market code (e.g. DE, GB, US)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: models
          path: /catalog/{countryCode}/brands/{brandId}/models
          description: "Models by brand and market."
          operations:
            - name: list-models-by-brand
              method: GET
              description: "List vehicle models for a brand in a market."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
                - name: brandId
                  in: path
                  type: string
                  required: true
                  description: "Brand UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: types
          path: /catalog/{countryCode}/models/{modelId}/types
          description: "Vehicle types by model."
          operations:
            - name: list-types-by-model
              method: GET
              description: "List vehicle types (trims, engine variants) for a model."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
                - name: modelId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: options
          path: /catalog/{countryCode}/types/{typeId}/options
          description: "Configurable options for a vehicle type."
          operations:
            - name: list-options-by-type
              method: GET
              description: "List all configurable options for a vehicle type."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
                - name: typeId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: buildability
          path: /operation/{countryCode}/check
          description: "Validate a vehicle configuration."
          operations:
            - name: check-buildability
              method: POST
              description: "Check whether a configuration is buildable."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  typeId: "{{tools.typeId}}"
                  selectedOptions: "{{tools.selectedOptions}}"

        - name: recover
          path: /operation/{countryCode}/recover
          description: "Recover a buildable configuration."
          operations:
            - name: recover-configuration
              method: POST
              description: "Return nearest valid configuration for an unbuildable selection."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  typeId: "{{tools.typeId}}"
                  selectedOptions: "{{tools.selectedOptions}}"

        - name: configure
          path: /operation/{countryCode}/configure
          description: "Get available options for current config."
          operations:
            - name: get-configuration-options
              method: POST
              description: "List available, unavailable, and required options."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  typeId: "{{tools.typeId}}"
                  selectedOptions: "{{tools.selectedOptions}}"

        - name: resolve
          path: /operation/{countryCode}/resolve
          description: "Resolve a partial configuration to a distinct one."
          operations:
            - name: resolve-configuration
              method: POST
              description: "Complete a partial configuration."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  typeId: "{{tools.typeId}}"
                  selectedOptions: "{{tools.selectedOptions}}"

        - name: wltp
          path: /operation/{countryCode}/wltp
          description: "WLTP emissions data for a configuration."
          operations:
            - name: get-wltp-data
              method: POST
              description: "Get WLTP fuel consumption and CO2 emissions for a configuration."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  typeId: "{{tools.typeId}}"
                  selectedOptions: "{{tools.selectedOptions}}"

        - name: images
          path: /operation/{countryCode}/images
          description: "Vehicle images for a configuration."
          operations:
            - name: get-configuration-images
              method: POST
              description: "Get image URLs for the configured vehicle."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  typeId: "{{tools.typeId}}"
                  selectedOptions: "{{tools.selectedOptions}}"

        - name: order
          path: /operation/{countryCode}/order
          description: "Order information for a configuration."
          operations:
            - name: get-order-information
              method: POST
              description: "Get pricing, standard equipment, and technical data."
              inputParameters:
                - name: countryCode
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  typeId: "{{tools.typeId}}"
                  selectedOptions: "{{tools.selectedOptions}}"

  exposes:
    - type: rest
      port: 8100
      namespace: volkswagen-okapi-rest
      resources:
        - path: /v1/countries
          name: countries
          operations:
            - method: GET
              name: list-countries
              description: "List supported markets."
              call: "volkswagen-okapi.list-countries"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/brands/{countryCode}
          name: brands
          operations:
            - method: GET
              name: list-brands-by-country
              description: "List brands by market."
              call: "volkswagen-okapi.list-brands-by-country"
              with:
                countryCode: "rest.countryCode"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/models/{countryCode}/{brandId}
          name: models
          operations:
            - method: GET
              name: list-models-by-brand
              description: "List models by brand."
              call: "volkswagen-okapi.list-models-by-brand"
              with:
                countryCode: "rest.countryCode"
                brandId: "rest.brandId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/types/{countryCode}/{modelId}
          name: types
          operations:
            - method: GET
              name: list-types-by-model
              description: "List vehicle types."
              call: "volkswagen-okapi.list-types-by-model"
              with:
                countryCode: "rest.countryCode"
                modelId: "rest.modelId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/options/{countryCode}/{typeId}
          name: options
          operations:
            - method: GET
              name: list-options-by-type
              description: "List configurable options."
              call: "volkswagen-okapi.list-options-by-type"
              with:
                countryCode: "rest.countryCode"
                typeId: "rest.typeId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: volkswagen-okapi-mcp
      transport: http
      tools:
        - name: list-countries
          description: "List all countries where VW OKAPI vehicle configuration is available."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.list-countries"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-brands
          description: "List VW Group brands available in a specific country market."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.list-brands-by-country"
          with:
            countryCode: "tools.countryCode"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-models
          description: "List vehicle models for a VW Group brand in a market."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.list-models-by-brand"
          with:
            countryCode: "tools.countryCode"
            brandId: "tools.brandId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-vehicle-types
          description: "List vehicle types (trims, engine variants) for a model."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.list-types-by-model"
          with:
            countryCode: "tools.countryCode"
            modelId: "tools.modelId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-configuration-options
          description: "List configurable options for a vehicle type (colors, wheels, packages)."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.list-options-by-type"
          with:
            countryCode: "tools.countryCode"
            typeId: "tools.typeId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: check-configuration-buildability
          description: "Validate whether a set of selected options forms a buildable vehicle configuration."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.check-buildability"
          with:
            countryCode: "tools.countryCode"
          outputParameters:
            - type: object
              mapping: "$."

        - name: recover-configuration
          description: "Find the nearest valid configuration given an unbuildable selection."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.recover-configuration"
          with:
            countryCode: "tools.countryCode"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-available-options
          description: "Get available, unavailable, and required options for the current configuration."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.get-configuration-options"
          with:
            countryCode: "tools.countryCode"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-wltp-emissions
          description: "Get WLTP fuel consumption and CO2 emissions for a vehicle configuration."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.get-wltp-data"
          with:
            countryCode: "tools.countryCode"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-vehicle-images
          description: "Get image URLs for a configured vehicle showing selected exterior and options."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.get-configuration-images"
          with:
            countryCode: "tools.countryCode"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-order-information
          description: "Get pricing, standard equipment, and technical specifications for a vehicle configuration."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volkswagen-okapi.get-order-information"
          with:
            countryCode: "tools.countryCode"
          outputParameters:
            - type: object
              mapping: "$."
