aid: volkswagen
name: Volkswagen
url: https://productdata.volkswagenag.com/
description: Volkswagen is a German automotive company and the parent of the VW Group,
  manufacturing vehicles under brands including Volkswagen, Audi, SEAT, Skoda, CUPRA,
  Porsche, Lamborghini, and Bentley. The OKAPI (Open Konfigurator API) provides programmatic
  access to VW AG product data for vehicle catalog browsing, interactive configuration,
  buildability validation, WLTP emissions data, configuration images, and order/pricing
  information across global markets.
