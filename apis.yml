apis:
- aid: volkswagen:volkswagen-okapi
  name: Volkswagen OKAPI - Open Konfigurator API
  description: The VW OKAPI API provides access to Volkswagen AG product data and
    vehicle configuration services across global markets. Catalog endpoints (GET)
    browse countries, brands, models, types, and options. Operation endpoints (POST)
    handle buildability checking, configuration recovery, interactive configuration,
    resolution, WLTP emissions data, vehicle images, and order information with pricing.
